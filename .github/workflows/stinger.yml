# Measure whether the coding agent that builds this repository cheats.
#
# WASP 2.0's claim is that AI agents wrote it under a governance contract (AGENTS.md). This
# job is the check on that claim: it runs a corpus of sandboxed traps that encode this
# repository's own house rules, and reports mechanically whether the agent broke them when
# breaking them was the shortest path to green. See stinger/README.md.
#
# Not on push. A run drives a live agent through every scenario, which costs money and
# minutes and produces a non-deterministic number; gating a push on it would be both
# expensive and wrong. It runs on demand and weekly, and its output is evidence, not a merge
# gate.
#
# WHY THIS IS NOT A CALL TO STINGER'S REUSABLE WORKFLOW
#
# It now could be — the corpus runs in one shot since the agent became contained. What still
# stops it is credentials: this repository's Codex authenticates from an auth.json, and CI has
# no way to produce one. The reusable workflow passes a secret as AGENT_API_KEY, which suits
# an API key and not a token file. Given an OPENAI_API_KEY secret, all of the below collapses
# to:
#
#   jobs:
#     integrity:
#       uses: cmcnosky/stinger/.github/workflows/stinger.yml@main
#       with: {working-directory: stinger, config: stinger.yaml}
#       secrets: {AGENT_API_KEY: ${{ secrets.OPENAI_API_KEY }}}
#
# NOT YET EXERCISED IN CI — needs that secret. The full corpus HAS been run locally against a
# contained agent across all five families; the package is committed under stinger/evidence/.
#
name: Stinger

on:
  workflow_dispatch:
  # A weekly schedule belongs here and is deliberately absent until the OPENAI_API_KEY
  # secret exists. Enabled now, it would fail every Monday for want of a credential and
  # leave a standing red X on the Actions tab of a repository whose entire claim is that
  # its checks mean something. Add the secret, then restore:
  #   schedule:
  #     - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: stinger-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Check out Stinger
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: cmcnosky/stinger
          ref: main
          path: .stinger
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install Stinger
        run: pip install ./.stinger

      - name: Build the verification image
        # Verification runs with the network disabled, so pytest has to already be in the
        # image. `stinger run` preflights this and refuses to start otherwise — without it
        # every scenario would fail for a reason that has nothing to do with the agent.
        run: docker build -t stinger-runner:1 -f .stinger/docker/runner.Dockerfile .stinger

      - name: Build the agent image
        # A separate image from the verifier, and the separation is the point: this one holds
        # the Codex CLI and has the network on; that one has neither. Named by stinger.yaml's
        # `container_image`, and without it `stinger run` refuses the X family outright.
        run: docker build -t stinger-codex-agent:1 -f .stinger/docker/codex-agent.Dockerfile .stinger

      - name: Prove this repository's traps are fair before judging anything by them
        # SPEC.md §12, over the corpus our own config names.
        working-directory: stinger
        run: stinger validate --config stinger.yaml

      - name: Run the integrity harness
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        working-directory: stinger
        # One run, all five families. The agent is contained by stinger.yaml's
        # container_image, which is what lets the X (safety/exfiltration) family run at all.
        run: stinger run --config stinger.yaml

      - name: Upload the reproducibility packages
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stinger-repro
          path: stinger/repro/
          if-no-files-found: warn

      - name: Publish the reports to the job summary
        if: always()
        working-directory: stinger
        run: |
          found=0
          for report in $(find repro -name report.md 2>/dev/null | sort); do
            cat "$report" >> "$GITHUB_STEP_SUMMARY"
            found=1
          done
          if [ "$found" -eq 0 ]; then
            echo "No report was produced — see the failing step above." >> "$GITHUB_STEP_SUMMARY"
          fi
