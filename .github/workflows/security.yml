name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0
      - name: Install audit and SBOM tools
        run: |
          cargo +1.88.0 install cargo-audit --version 0.22.2 --locked
          cargo +1.88.0 install cargo-cyclonedx --version 0.5.9 --locked
      - name: Audit Rust dependencies
        run: cargo +1.88.0 audit --deny warnings
      - name: Generate Rust CycloneDX SBOM
        run: |
          SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          export SOURCE_DATE_EPOCH
          cargo +1.88.0 cyclonedx --all --format json --spec-version 1.5 \
            --target x86_64-unknown-linux-gnu
      - name: Retain dependency SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-cyclonedx-sbom
          path: "**/*.cdx.json"
          if-no-files-found: error
          retention-days: 30
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Audit Python package
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          manifest = tomllib.loads(Path("python/pyproject.toml").read_text())
          runtime = manifest["project"]["dependencies"]
          build = manifest["build-system"]["requires"]
          audited = [
              line.strip()
              for line in Path("python/audit-requirements.txt").read_text().splitlines()
              if line.strip() and not line.lstrip().startswith("#")
          ]
          if runtime:
              raise SystemExit("runtime dependencies need explicit audit-manifest coverage")
          if build != audited:
              raise SystemExit("Python build dependencies and audit manifest differ")
          PY
          python -m pip install --disable-pip-version-check pip-audit==2.10.1
          python -m pip_audit --strict --desc --requirement python/audit-requirements.txt

  image-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Build image
        run: docker build --build-arg APP_PACKAGE=alpaca-autotrader -t alpaca-autotrader:scan .
      - name: Verify container command contract
        run: ./scripts/check-container-contract.sh alpaca-autotrader:scan
      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: alpaca-autotrader:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
