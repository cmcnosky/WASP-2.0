name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install ripgrep
        # The clean-room audit and the secret scan are built on it, and both now refuse to
        # run without it rather than reporting a pass they did not earn. GitHub's
        # ubuntu-latest image does NOT ship ripgrep — which means that until those scripts
        # were made to fail closed, every scan in this job had been silently finding nothing
        # and reporting success. This step is what makes the two below actually execute.
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Clean-room audit
        run: ./scripts/check-clean-room.sh
      - name: Secret scan
        run: ./scripts/check-secrets.sh
      - name: Shell syntax
        run: bash -n scripts/*.sh
      - name: Compose schema
        run: docker compose config --quiet

  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.88.0 --profile minimal --component rustfmt,clippy
      - name: Select Rust toolchain
        run: rustup default 1.88.0
      - name: Formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Tests
        run: cargo test --workspace --all-features --locked

  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - name: Install research checks
        run: |
          python -m pip install --disable-pip-version-check \
            pytest==8.3.5 mypy==1.15.0 ruff==0.11.2
          python -m pip install --disable-pip-version-check -e python
      - name: Lint
        run: python -m ruff check python
      - name: Types
        run: python -m mypy python/src python/tests
      - name: Tests
        run: python -m pytest python/tests

  compiled-python-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Build and exercise compiled PyO3 bridge
        run: ./scripts/check-pyo3.sh

  postgres:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Apply migrations and exercise ledger invariants and races
        run: ./scripts/check-postgres.sh

  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false
      - name: Formatting
        run: terraform -chdir=infra/terraform fmt -check -recursive
      - name: Verify supported provider lock platforms
        run: |
          terraform -chdir=infra/terraform providers lock \
            -platform=linux_amd64 \
            -platform=linux_arm64 \
            -platform=darwin_arm64
          git diff --exit-code -- infra/terraform/.terraform.lock.hcl
      - name: Initialize without backend
        run: terraform -chdir=infra/terraform init -backend=false -input=false -lockfile=readonly
      - name: Validate
        run: terraform -chdir=infra/terraform validate
      - name: Mocked plan tests
        run: terraform -chdir=infra/terraform test -test-directory=tests

  container:
    runs-on: ubuntu-latest
    needs: [governance, rust, python, compiled-python-parity, postgres, terraform]
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up container-backed Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build OCI image with provenance and SBOM
        run: |
          docker buildx build \
            --build-arg APP_PACKAGE=alpaca-autotrader \
            --provenance=mode=max \
            --sbom=true \
            --output=type=oci,dest=/tmp/alpaca-autotrader.oci.tar .
      - name: Verify image archive
        run: test -s /tmp/alpaca-autotrader.oci.tar
