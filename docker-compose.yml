name: alpaca-autotrader

services:
  postgres:
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    environment:
      POSTGRES_DB: alpaca_autotrader
      POSTGRES_USER: local_trader
      POSTGRES_PASSWORD: local_only_not_a_secret
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local_trader -d alpaca_autotrader"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    profiles: ["app"]
    build:
      context: .
      args:
        APP_PACKAGE: alpaca-autotrader
    environment:
      APP_ENVIRONMENT: local
      EXECUTION_MODE: read_only
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: alpaca_autotrader
      DATABASE_USER: local_trader
      DATABASE_PASSWORD: local_only_not_a_secret
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true

volumes:
  postgres-data:
